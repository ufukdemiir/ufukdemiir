name: Profil Sayacı Güncelleyici

on:
  schedule:
    - cron: '0 */3 * * *' # Her 3 saatte bir otomatik güncellenir
  workflow_dispatch: # İstediğiniz an manuel çalıştırmak için

jobs:
  update-views:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v3

      - name: Sayacı Güncelle
        run: |
          # Bu kısım GitHub API kullanarak profil trafiğini çeker
          VIEWS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/traffic/views \
            | grep '"count":' | head -n 1 | awk '{print $2}' | sed 's/,//')
          
          # Eğer trafik henüz oluşmadıysa veya 0 ise varsayılan değer atar
          if [ -z "$VIEWS" ] || [ "$VIEWS" -eq 0 ]; then VIEWS="1"; fi
          
          # Markdown dosyasındaki etiketlerin arasını günceller
          TEXT="👁️ **Profil Görüntülenme Sayısı:** $VIEWS"
          sed -i "/<!-- PROFILE_VIEWS_START -->/,/<!-- PROFILE_VIEWS_END -->/c\<!-- PROFILE_VIEWS_START -->\n$TEXT\n<!-- PROFILE_VIEWS_END -->" README.md

      - name: Değişiklikleri Commit Et
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git diff --quiet && git diff --staged --quiet || (git add README.md && git commit -m "Ziyaretçi sayısı güncellendi" && git push)
